img_model:
  name: "ImgCond"
  arch: "UNetCond_SpatialCondition_Hadamart"
  image_size: 256
  in_image: ['raw']
  in_channels: 3
  out_channels: 3
  conditioning: True  # Conditioning with DECA
  condition_proj_dim: 512
  hadamart_prep: "Tanh"

param_model:
  params_selector: ['shape', 'pose', 'exp', 'cam', 'faceemb', 'shadow', 'skincolor']


img_cond_model:
  apply: True
  arch: "EncoderUNet_SpatialCondition"
  in_image: ['deca_masked_face_images_woclip', 'faceseg_nohead', 'albedo_masked_face_images_woclip']
  in_channels: 7
  image_size: 256
  out_channels: 128
  condition_dim: 256
  override_cond: "spatial_latent"
  prep_image: [Null, Null, Null]
  noise_dpm_cond_img: [Null, Null, Null]

train:
  sampling_interval: 25000
  save_interval: 5000

dataset:
  root_path: "/home/user/data"
  training_data: "ffhq_256_with_anno"

train_misc:
  exp_name: "IFS-Light"
  cfg_name: "ifslight_256"